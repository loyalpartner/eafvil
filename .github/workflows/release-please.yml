name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          # PAT (Personal Access Token) instead of the default GITHUB_TOKEN.
          # Two reasons:
          #   1. GITHUB_TOKEN occasionally fails silently when creating the
          #      tag/release (we've seen "Expected 1 releases, only found 0"
          #      with GITHUB_TOKEN). PAT exercises a different API path.
          #   2. Tags pushed by GITHUB_TOKEN do NOT trigger downstream
          #      workflows, so release.yml's `push: tags` would never fire.
          #      PAT-authored tags do trigger them — closes the automation loop.
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
